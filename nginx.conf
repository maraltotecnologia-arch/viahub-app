server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA entry point — nunca cachear para garantir que o browser
    # sempre busque a versão mais recente após novos deploys
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # Fallback SPA: qualquer rota desconhecida serve o index.html
    # Isso resolve o 404 ao dar F5 em rotas como /login, /dashboard, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash (js, css, imagens, fontes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
